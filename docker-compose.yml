services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: thesis
    ports:
      - "5544:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data          # persists data across restarts
      - ./db/seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro   # runs on first init

volumes:
  pgdata: